<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 700; }
    .panel-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; }
    .box-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 700; }
    .step-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 400; }
  </style>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#ffffff"/>
  <text x="350" y="30" text-anchor="middle" class="title" fill="#1a1a1a">Synchronous vs Asynchronous Replication</text>

  <!-- Synchronous Panel -->
  <rect x="20" y="55" width="320" height="335" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="180" y="82" text-anchor="middle" class="panel-title" fill="#E65100">Synchronous</text>

  <rect x="50" y="105" width="100" height="40" rx="5" fill="#FFCC80" stroke="#E65100"/>
  <text x="100" y="130" text-anchor="middle" class="box-label" fill="#7A3E00">Client</text>

  <rect x="50" y="185" width="100" height="40" rx="5" fill="#FFAB91" stroke="#BF360C"/>
  <text x="100" y="210" text-anchor="middle" class="box-label" fill="#7A2600">Master</text>

  <rect x="220" y="185" width="100" height="40" rx="5" fill="#A5D6A7" stroke="#2E7D32"/>
  <text x="270" y="210" text-anchor="middle" class="box-label" fill="#1B5E20">Slave</text>

  <line x1="100" y1="145" x2="100" y2="185" stroke="#444" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="105" y="168" class="step-label">1. write</text>

  <line x1="150" y1="195" x2="220" y2="195" stroke="#444" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="155" y="188" class="step-label">2. send</text>

  <line x1="220" y1="215" x2="150" y2="215" stroke="#444" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="160" y="232" class="step-label">3. ack (committed)</text>

  <line x1="100" y1="185" x2="100" y2="145" stroke="#444" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="105" y="270" class="step-label">4. success returned only</text>
  <text x="105" y="284" class="step-label">   after Slave confirms</text>

  <text x="180" y="330" text-anchor="middle" class="step-label" font-weight="700" fill="#7A2600">Zero data loss, but higher write latency</text>
  <text x="180" y="348" text-anchor="middle" class="step-label" fill="#7A2600">Master waits for Slave's acknowledgment</text>
  <text x="180" y="366" text-anchor="middle" class="step-label" fill="#7A2600">before confirming the write to client</text>

  <!-- Asynchronous Panel -->
  <rect x="360" y="55" width="320" height="335" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="520" y="82" text-anchor="middle" class="panel-title" fill="#1565C0">Asynchronous</text>

  <rect x="390" y="105" width="100" height="40" rx="5" fill="#90CAF9" stroke="#1565C0"/>
  <text x="440" y="130" text-anchor="middle" class="box-label" fill="#0D47A1">Client</text>

  <rect x="390" y="185" width="100" height="40" rx="5" fill="#FFAB91" stroke="#BF360C"/>
  <text x="440" y="210" text-anchor="middle" class="box-label" fill="#7A2600">Master</text>

  <rect x="560" y="185" width="100" height="40" rx="5" fill="#A5D6A7" stroke="#2E7D32"/>
  <text x="610" y="210" text-anchor="middle" class="box-label" fill="#1B5E20">Slave</text>

  <line x1="440" y1="145" x2="440" y2="185" stroke="#444" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="445" y="168" class="step-label">1. write</text>

  <line x1="440" y1="185" x2="440" y2="145" stroke="#444" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="380" y="165" class="step-label">2. success returned</text>
  <text x="382" y="178" class="step-label">   immediately</text>

  <line x1="490" y1="200" x2="560" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="490" y="240" class="step-label">3. replication happens</text>
  <text x="497" y="253" class="step-label">   later / in background</text>

  <text x="520" y="330" text-anchor="middle" class="step-label" font-weight="700" fill="#0D47A1">Low write latency, but risk of data loss</text>
  <text x="520" y="348" text-anchor="middle" class="step-label" fill="#0D47A1">Client doesn't wait for Slave — Slave may</text>
  <text x="520" y="366" text-anchor="middle" class="step-label" fill="#0D47A1">lag behind Master (eventual consistency)</text>
</svg>
